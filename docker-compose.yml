services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-repotriage}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-repotriage}
      POSTGRES_DB: ${POSTGRES_DB:-repotriage}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-repotriage} -d ${POSTGRES_DB:-repotriage}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://repotriage:repotriage@postgres:5432/repotriage}
      REPOTRIAGE_INFERENCE_CONFIG: ${REPOTRIAGE_INFERENCE_CONFIG:-configs/inference/pandas-dev__pandas/local-v1.json}
    command:
      - repotriage
      - serve
      - --config
      - ${REPOTRIAGE_INFERENCE_CONFIG:-configs/inference/pandas-dev__pandas/local-v1.json}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    volumes:
      - ./data/model_ready:/app/data/model_ready:ro
      - ./data/baselines:/app/data/baselines:ro
      - ./data/threshold_policies:/app/data/threshold_policies:ro
      - ./data/abstention_policies:/app/data/abstention_policies:ro
      - ./data/retrieval_baselines:/app/data/retrieval_baselines:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  postgres_data:
